<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/var.css">
        <link rel="stylesheet" href="css/style.css">
        <script src="script.js" defer></script>
        <title>Library</title>
    </head>
    <body>
        <div class="library">
            <header class="header">
                <div class="header__main">
                    <div class="header__title">
                        <h2 class="header__text">All Books</h2>
                        <p class="header__description description">
                            Your personal collections of books
                        </p>
                    </div>
                    <div class="header__action">
                        <div class="search">
                            <input
                                type="search"
                                class="search__input"
                                placeholder="Search books..."
                                aria-label="Search"
                            >
                        </div>
                        <button class="btn btn--primary btn__add" type="submit">
                            + Add Book
                        </button>
                    </div>
                    <dialog class="modal">
                        <form action="#" class="form" method="dialog">
                            <div class="form__header">
                                <h3 class="form__tittle">Add New Book</h3>

                                <div class="form__close close">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="icon form__close"
                                    >
                                        <title>Close Icon</title>
                                        <path d="M18 6 6 18" />
                                        <path d="m6 6 12 12" />
                                    </svg>
                                </div>
                            </div>

                            <div class="form__field--title">
                                <label class="form__label" for="title">
                                    Title<span class="highlight--red">*</span>
                                </label>
                                <input
                                    required
                                    class="form__input required"
                                    type="text"
                                    id="title"
                                    name="title"
                                    placeholder="Enter book title"
                                >
                            </div>
                            <div class="form__field--author">
                                <label class="form__label" for="author">
                                    Author<span class="highlight--red">*</span>
                                </label>
                                <input
                                    required
                                    class="form__input required"
                                    type="text"
                                    id="author"
                                    name="author"
                                    placeholder="Enter author name"
                                >
                            </div>
                            <div class="form__field--pages">
                                <label class="form__label" for="pages">
                                    Pages<span class="highlight--red">*</span>
                                </label>
                                <input
                                    required
                                    class="form__input required"
                                    type="text"
                                    id="pages"
                                    name="pages"
                                    placeholder="Enter number of pages"
                                >
                            </div>
                            <div class="form__field--read">
                                <label class="form__label" for="read">
                                    Read<span class="highlight--red">*</span>
                                </label>
                                <div class="switch form__switch">
                                    <input
                                        name="read"
                                        id="read"
                                        class="switch__input"
                                        type="checkbox"
                                    >
                                    <span class="switch__slider"></span>
                                    <span class="form__description">
                                        I have read this book.
                                    </span>
                                </div>
                            </div>

                            <div class="form__submit">
                                <div class="form__btn-container">
                                    <button
                                        class="btn btn--secondary close"
                                        type="button"
                                    >
                                        Cancel
                                    </button>
                                    <button
                                        id="open"
                                        class="btn btn--primary"
                                        type="submit"
                                    >
                                        Add Book
                                    </button>
                                </div>
                            </div>
                        </form>
                    </dialog>
                </div>
                <div class="header__sort">
                    <button class="btn btn--primary btn__sort" type="submit">All</button>
                    <button class="btn btn--secondary btn__sort" type="submit">
                        Read
                    </button>
                    <button class="btn btn--secondary btn__sort" type="submit">
                        UnRead
                    </button>
                </div>
            </header>
            <aside class="sidebar">
                <header class="sidebar__header">
                    <a class="sidebar__link" href="#">
                        <span class="icon sidebar__logo">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="36"
                                height="36"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon icon__brand"
                                aria-hidden="true"
                            >
                                <path d="M12 7v14" />
                                <path
                                    d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"
                                />
                            </svg>
                        </span>
                        <h2 class="sidebar__brand-text">Sean Library</h2>
                    </a>
                </header>

                <div class="sidebar__nav">
                    <ul class="sidebar__menu">
                        <li class="sidebar__item active">
                            <button type="button" class="sidebar__btn">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-book-open-icon lucide-book-open"
                                        aria-hidden="true"
                                    >
                                        <path d="M12 7v14" />
                                        <path
                                            d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"
                                        />
                                    </svg>
                                </span>
                                <span class="sidebar__label">All Books</span>
                            </button>
                        </li>
                        <li class="sidebar__item">
                            <button type="button" class="sidebar__btn">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-circle-check-big-icon lucide-circle-check-big"
                                        aria-hidden="true"
                                    >
                                        <path d="M21.801 10A10 10 0 1 1 17 3.335" />
                                        <path d="m9 11 3 3L22 4" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Read</span>
                            </button>
                        </li>
                        <li class="sidebar__item">
                            <button type="button" class="sidebar__btn">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-circle-icon lucide-circle"
                                        aria-hidden="true"
                                    >
                                        <circle cx="12" cy="12" r="10" />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Unread</span>
                            </button>
                        </li>
                        <li class="sidebar__item sidebar__break"></li>
                        <li class="sidebar__item">
                            <button type="button" class="sidebar__btn">
                                <span class="icon sidebar__icon">
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        width="24"
                                        height="24"
                                        viewBox="0 0 24 24"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="2"
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        class="lucide lucide-trash2-icon lucide-trash-2"
                                        aria-hidden="true"
                                    >
                                        <path d="M10 11v6" />
                                        <path d="M14 11v6" />
                                        <path
                                            d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"
                                        />
                                        <path d="M3 6h18" />
                                        <path
                                            d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                                        />
                                    </svg>
                                </span>
                                <span class="sidebar__label">Clear Library</span>
                            </button>
                        </li>
                    </ul>
                </div>
            </aside>
            <main class="main">
                <div class="log">
                    <ul class="log__menu">
                        <!-- List of book log item will be generated using JS -->
                        <li class="book">
                            <div class="book__cover"></div>
                            <div class="book__info">
                                <h3 class="book__title">The Alchemist</h3>
                                <p class="book__author">Paulo Coelho</p>
                                <p class="book__page">208 pages</p>
                            </div>
                            <p class="book__read read">Read</p>
                            <label class="switch">
                                <input class="switch__input" type="checkbox">
                                <span class="switch__slider"></span>
                            </label>
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon trash__icon"
                            >
                                <title>Delete</title>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                <path d="M3 6h18"></path>
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </li>
                        <li class="book">
                            <div class="book__cover"></div>
                            <div class="book__info">
                                <h3 class="book__title">The Alchemist</h3>
                                <p class="book__author">Paulo Coelho</p>
                                <p class="book__page">208 pages</p>
                            </div>
                            <p class="book__read unread">UnRead</p>
                            <label class="switch">
                                <input class="switch__input" type="checkbox">
                                <span class="switch__slider"></span>
                            </label>
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="24"
                                height="24"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                class="icon trash__icon"
                            >
                                <title>Delete</title>
                                <path d="M10 11v6"></path>
                                <path d="M14 11v6"></path>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path>
                                <path d="M3 6h18"></path>
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </li>
                    </ul>
                </div>
            </main>
        </div>
    </body>
</html>
